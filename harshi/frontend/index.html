<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Defense Decision Support System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0b1c2d;
    color: #e0e6ed;
    display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 230px;
    background: #081a2b;
    height: 100vh;
    padding: 20px;
    border-right: 2px solid #1f4e79;
}

.sidebar h2 {
    color: #7cc4ff;
    text-align: center;
    margin-bottom: 30px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    background: #102a43;
    color: #e0e6ed;
    border: none;
    text-align: left;
    cursor: pointer;
}

.sidebar button:hover {
    background: #1f4e79;
}

/* ===== MAIN CONTENT ===== */
.main {
    flex: 1;
}

header {
    background: #102a43;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #1f4e79;
}

header h1 {
    margin: 0;
    color: #7cc4ff;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
}

.card {
    background: #132f4c;
    border-radius: 8px;
    padding: 15px;
}

.card h2 {
    color: #7cc4ff;
    border-bottom: 1px solid #1f4e79;
    padding-bottom: 8px;
}

/* Threat colors */
.threat {
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
}
.low { color: #4caf50; }
.medium { color: #ff9800; }
.high { color: #f44336; }

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

/* Alerts */
.alert {
    background: #4a1f1f;
    padding: 10px;
    margin-bottom: 8px;
    border-left: 4px solid #f44336;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}
td, th {
    border-bottom: 1px solid #1f4e79;
    padding: 8px;
}

canvas {
    background: #0b1c2d;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🛡 DDSS</h2>
    <button onclick="showSection('analysis')">Threat Analysis</button>
    <button onclick="showSection('alerts')">Real-Time Alerts</button>
    <button onclick="showSection('sensors')">Sensor Intelligence</button>
    <button onclick="showSection('forecast')">Risk Forecast</button>
</div>

<!-- MAIN -->
<div class="main">

<header>
    <h1>Defense Decision Support System</h1>
    <p>Data Science & Machine Learning Powered</p>
</header>

<div class="container">

<!-- Threat Analysis -->
<div class="card section" id="analysis">
    <h2>Threat Analysis (ML)</h2>

    <input id="threat" type="number" placeholder="Threat Level (1-5)">
    <input id="sensor" type="number" placeholder="Sensor Activity (0-100)">

    <select id="comm">
        <option value="0">Communication Normal</option>
        <option value="1">Communication Anomaly</option>
    </select>

    <select id="sat">
        <option value="0">No Satellite Alert</option>
        <option value="1">Satellite Alert</option>
    </select>

    <button onclick="analyze()">Analyze Situation</button>

    <div id="threatLevel" class="threat">---</div>
    <p id="decisionText" style="text-align:center;"></p>
</div>

<!-- Alerts -->
<div class="card section" id="alerts">
    <h2>Real-Time Alerts</h2>
    <div id="alertBox"></div>
</div>

<!-- Sensor Data -->
<div class="card section" id="sensors">
    <h2>Sensor & Intelligence Data</h2>
    <table>
        <tr><th>Source</th><th>Region</th><th>Status</th></tr>
        <tr><td>Satellite</td><td>North Zone</td><td>Active</td></tr>
        <tr><td>Radar</td><td>East Border</td><td>Warning</td></tr>
        <tr><td>Drone Feed</td><td>Sector 7</td><td>Monitoring</td></tr>
    </table>
</div>

<!-- Forecast -->
<div class="card section" id="forecast">
    <h2>Risk Forecast (Next 24 hrs)</h2>
    <canvas id="forecastChart"></canvas>
</div>

</div>
</div>

<script>
function showSection(id) {
    document.querySelectorAll(".section").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "block";
}
showSection("analysis");

let chart;

function analyze() {
    const payload = {
        threat_level: Number(threat.value),
        sensor_activity: Number(sensor.value),
        communication_anomaly: Number(comm.value),
        satellite_alert: Number(sat.value)
    };

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        const tl = document.getElementById("threatLevel");
        tl.textContent = data.risk_level.toUpperCase();
        tl.className = "threat " + data.risk_level.toLowerCase();

        document.getElementById("decisionText").textContent = data.decision;

        generateAlerts(data.risk_level);
        drawForecast(data.risk_level);
    });
}

function generateAlerts(risk) {
    const box = document.getElementById("alertBox");
    box.innerHTML = "";

    if (risk === "High") {
        box.innerHTML += `<div class="alert">High troop movement detected</div>`;
        box.innerHTML += `<div class="alert">Satellite anomaly confirmed</div>`;
    } else if (risk === "Medium") {
        box.innerHTML += `<div class="alert">Suspicious communication pattern</div>`;
    } else {
        box.innerHTML += `<div class="alert">No immediate threats</div>`;
    }
}

function drawForecast(risk) {
    const values = {
        Low: [20,25,30,28,26,25],
        Medium: [40,45,50,55,52,50],
        High: [70,75,85,90,88,92]
    };

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("forecastChart"), {
        type: "line",
        data: {
            labels: ["0h","4h","8h","12h","16h","24h"],
            datasets: [{
                label: "Risk Index",
                data: values[risk],
                borderColor: "#7cc4ff",
                fill: false
            }]
        }
    });
}
</script>

</body>
</html>
